<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Level Up — Beranda</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,700;0,900;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080a12;
  --s1: #0e1120;
  --s2: #141728;
  --border: #1e2240;
  --gold: #e6af2e;
  --gold2: #f5d06a;
  --text: #dde2f5;
  --muted: #5a6080;
  --r: 14px;
  --c1: #4f8ef7; --c2: #f76b8a; --c3: #4fcf8e; --c4: #f7b84f;
  --c5: #c96cf7; --c6: #4fcfcf; --c7: #f76b4f; --c8: #8ef74f;
  --c9: #f74fb8; --c10: #4f9cf7;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh;overflow-x:hidden;}

/* Noise overlay */
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");pointer-events:none;z-index:100;opacity:.4;}

/* Grid bg */
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(78,120,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(78,120,255,.04) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;}

.wrap{max-width:1000px;margin:0 auto;padding:40px 20px 80px;}

/* ── Header ── */
.hero{text-align:center;padding:60px 0 50px;position:relative;}
.hero-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(230,175,46,.1);border:1px solid rgba(230,175,46,.25);color:var(--gold);font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;padding:7px 18px;border-radius:99px;margin-bottom:24px;}
.hero h1{font-family:'Fraunces',serif;font-size:clamp(3rem,8vw,5.5rem);font-weight:900;line-height:1;letter-spacing:-2px;margin-bottom:16px;}
.hero h1 em{font-style:italic;color:var(--gold);}
.hero p{color:var(--muted);font-size:16px;font-weight:300;max-width:460px;margin:0 auto 36px;}

/* Name input */
.name-box{display:flex;gap:12px;justify-content:center;align-items:center;flex-wrap:wrap;margin-bottom:16px;}
.name-input{background:var(--s1);border:1px solid var(--border);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;padding:14px 20px;border-radius:12px;outline:none;width:280px;transition:border-color .2s;}
.name-input::placeholder{color:var(--muted);}
.name-input:focus{border-color:var(--gold);}
.name-hint{font-size:12px;color:var(--muted);text-align:center;min-height:18px;}
.name-hint.err{color:#f87171;}

/* ── Section heading ── */
.section-label{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:24px;display:flex;align-items:center;gap:12px;}
.section-label::after{content:'';flex:1;height:1px;background:var(--border);}

/* ── Level grid ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-bottom:48px;}

.card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:24px;cursor:pointer;transition:all .22s ease;position:relative;overflow:hidden;text-decoration:none;display:block;}
.card:hover{transform:translateY(-4px);border-color:var(--card-c);}
.card::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 30% 50%,var(--card-c) 0%,transparent 70%);opacity:0;transition:opacity .3s;}
.card:hover::before{opacity:.06;}

.card-num{font-family:'Fraunces',serif;font-size:42px;font-weight:900;color:var(--card-c);line-height:1;margin-bottom:8px;opacity:.8;}
.card-level{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--card-c);margin-bottom:10px;opacity:.7;}
.card-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:6px;line-height:1.4;}
.card-sub{font-size:12px;color:var(--muted);line-height:1.5;}
.card-arrow{position:absolute;bottom:20px;right:20px;width:28px;height:28px;border:1px solid var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:14px;transition:all .2s;}
.card:hover .card-arrow{border-color:var(--card-c);color:var(--card-c);}

/* Disabled state */
.card.disabled{opacity:.35;cursor:not-allowed;pointer-events:none;}

/* ── Footer ── */
.footer{text-align:center;color:var(--muted);font-size:13px;padding-top:32px;border-top:1px solid var(--border);}

/* Fade-in animation */
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}
.hero{animation:fadeUp .6s ease forwards;}
.grid .card{opacity:0;animation:fadeUp .5s ease forwards;}
</style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <div class="hero-badge">MTs Sains Algebra</div>
    <h1>Math <em>Level</em> Up</h1>

    <div class="name-box">
      <input class="name-input" id="nameInput" type="text" placeholder="Masukkan nama…" maxlength="40" oninput="onNameInput()">
    </div>
    <div class="name-hint" id="nameHint">Nama akan dipakai untuk sertifikat</div>
  </div>

  <div class="section-label">Pilih Level</div>

  <div class="grid" id="levelGrid">
    <!-- Filled by JS -->
  </div>

  <div class="footer">Math Level Up &nbsp;·&nbsp; 50 soal per sesi &nbsp;·&nbsp; Angka diacak setiap sesi</div>
</div>

<script>
const levels = [
  { num:1,  title:'Penjumlahan & Pengurangan',   sub:'Bilangan bulat 1–100, kombinasi +/−',           c:'var(--c1)'  },
  { num:2,  title:'Perkalian & Pembagian',        sub:'Bilangan bulat, kombinasi ×/÷',                 c:'var(--c2)'  },
  { num:3,  title:'Kombinasi 4 Operasi',          sub:'Hierarki operasi, bilangan bulat',              c:'var(--c3)'  },
  { num:4,  title:'Pecahan: Konversi & Simplifikasi', sub:'Biasa ↔ desimal ↔ persen, bentuk sederhana', c:'var(--c4)'  },
  { num:5,  title:'Penjumlahan & Pengurangan Pecahan', sub:'Penyebut sejenis/tidak sejenis, desimal, campuran', c:'var(--c5)'  },
  { num:6,  title:'Perkalian & Pembagian Pecahan', sub:'Biasa, desimal, campuran',                     c:'var(--c6)'  },
  { num:7,  title:'KPK & FPB',                   sub:'Soal langsung & soal cerita',                   c:'var(--c7)'  },
  { num:8,  title:'Perbandingan',                 sub:'Skala, senilai, berbalik nilai, selisih',       c:'var(--c8)'  },
  { num:9,  title:'Bangun Datar & Ruang',         sub:'Keliling, luas, volume, soal cerita',           c:'var(--c9)'  },
  { num:10, title:'Aljabar Dasar',                sub:'Variabel, operasi, pemfaktoran, substitusi',    c:'var(--c10)' },
];

function onNameInput() {
  const v = document.getElementById('nameInput').value.trim();
  const hint = document.getElementById('nameHint');
  if (v.length < 2) {
    hint.textContent = 'Nama minimal 2 karakter';
    hint.className = 'name-hint err';
  } else {
    hint.textContent = `Halo, ${v}! Silakan pilih level.`;
    hint.className = 'name-hint';
  }
  document.querySelectorAll('.card').forEach(c => {
    c.classList.toggle('disabled', v.length < 2);
  });
}

function buildGrid() {
  const grid = document.getElementById('levelGrid');
  levels.forEach((lv, idx) => {
    const a = document.createElement('a');
    a.className = 'card disabled';
    a.href = `level${lv.num}.html`;
    a.style.setProperty('--card-c', lv.c);
    a.style.animationDelay = `${idx * 0.06}s`;
    a.onclick = e => {
      const name = document.getElementById('nameInput').value.trim();
      if (name.length < 2) { e.preventDefault(); document.getElementById('nameInput').focus(); return; }
      sessionStorage.setItem('MLU_userName', name);
      sessionStorage.setItem('MLU_level', lv.num);
    };
    a.innerHTML = `
      <div class="card-num">${String(lv.num).padStart(2,'0')}</div>
      <div class="card-level">Level ${lv.num}</div>
      <div class="card-title">${lv.title}</div>
      <div class="card-sub">${lv.sub}</div>
      <div class="card-arrow">→</div>`;
    grid.appendChild(a);
  });
}

buildGrid();
</script>
</body>
</html>
